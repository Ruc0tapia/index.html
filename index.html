<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlindMaster OS Hub</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --accent-blue: #007bff;
            --accent-green: #00e676;
            --accent-red: #ff3d00;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }

        header { width: 100%; text-align: center; margin-bottom: 30px; margin-top: 20px; }
        h1 { font-size: 24px; font-weight: 600; letter-spacing: 1px; }
        
        #statusMessage {
            margin-top: 5px;
            font-size: 14px;
            color: var(--text-muted);
            transition: color 0.3s;
        }

        .connected-text { color: var(--accent-green) !important; }

        #connectBtn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
            transition: transform 0.1s, background-color 0.3s;
            margin-bottom: 30px;
            width: 100%;
            max-width: 300px;
        }

        #connectBtn:active { transform: scale(0.95); }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            opacity: 0.3;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .dashboard-grid.active {
            opacity: 1;
            pointer-events: auto;
        }

        .control-btn {
            background-color: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid #333;
            padding: 20px 10px;
            font-size: 16px;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .control-btn:active { background-color: #2a2a2a; border-color: var(--accent-blue); }

        .btn-icon { font-size: 24px; margin-bottom: 8px; }

        /* Specific Button Colors */
        .btn-trunk { grid-column: span 2; border-color: rgba(255, 61, 0, 0.3); }
        .btn-trunk:active { background-color: rgba(255, 61, 0, 0.1); border-color: var(--accent-red); }

        .btn-power-off { grid-column: span 2; border-color: rgba(255, 59, 48, 0.5); color: #ff3b30; margin-top: 10px; }
        .btn-power-off:active { background-color: rgba(255, 59, 48, 0.1); border-color: #ff3b30; }

        .section-title {
            grid-column: span 2;
            text-align: left;
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <h1>BlindMaster OS</h1>
        <div id="statusMessage">Disconnected</div>
    </header>

    <button id="connectBtn">PAIR MOTORCYCLE</button>

    <div class="dashboard-grid" id="dashboard">
        <div class="section-title">Drive Modes</div>
        <button class="control-btn" onclick="sendCommand('MODE_1')">
            <span class="btn-icon">🍃</span> Eco
        </button>
        <button class="control-btn" onclick="sendCommand('MODE_2')">
            <span class="btn-icon">🏙️</span> City
        </button>
        <button class="control-btn" onclick="sendCommand('MODE_3')" style="grid-column: span 2;">
            <span class="btn-icon">⚡</span> Sport
        </button>

        <div class="section-title">Controls</div>
        <button class="control-btn" onclick="sendCommand('LIGHT_ON')">
            <span class="btn-icon">🔦</span> Lights ON
        </button>
        <button class="control-btn" onclick="sendCommand('LIGHT_OFF')">
            <span class="btn-icon">⚫</span> Lights OFF
        </button>

        <button class="control-btn btn-trunk" onclick="sendCommand('TRUNK')">
            <span class="btn-icon">🔓</span> Open Trunk
        </button>

        <button class="control-btn btn-power-off" onclick="confirmPowerOff()">
            <span class="btn-icon">🛑</span> Power Off Motorcycle
        </button>
    </div>

    <script>
        const SERVICE_UUID = "6E400001-B5A3-F393-E0A9-E50E24DCCA9E".toLowerCase();
        const RX_CHAR_UUID = "6E400002-B5A3-F393-E0A9-E50E24DCCA9E".toLowerCase();

        // --- NEW: THE DIGITAL ID BADGE ---
        let userName = localStorage.getItem("blindmaster_user");
        if (!userName) {
            // First time opening the app! Ask for identity.
            let input = prompt("Welcome to BlindMaster OS.\nWho owns this phone? (Type ADRIAN or RUBEN)");
            if (input) {
                userName = input.trim().toUpperCase();
                localStorage.setItem("blindmaster_user", userName);
            } else {
                userName = "GUEST"; // Fallback
            }
        }
        let bleDevice = null;
        let rxCharacteristic = null;

        const connectBtn = document.getElementById('connectBtn');
        const statusMessage = document.getElementById('statusMessage');
        const dashboard = document.getElementById('dashboard');

        connectBtn.addEventListener('click', async () => {
            if (bleDevice && bleDevice.gatt.connected) {
                bleDevice.gatt.disconnect();
                return;
            }

            try {
                statusMessage.innerText = "Scanning for BlindMaster_B...";
                
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'BlindMaster_B' }],
                    optionalServices: [SERVICE_UUID]
                });

                bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

                statusMessage.innerText = "Connecting to Core...";
                const server = await bleDevice.gatt.connect();

                statusMessage.innerText = "Locating Secure Services...";
                const service = await server.getPrimaryService(SERVICE_UUID);

                statusMessage.innerText = "Establishing Uplink...";
                rxCharacteristic = await service.getCharacteristic(RX_CHAR_UUID);

                // Successfully Connected!
                statusMessage.innerText = "Link Established";
                statusMessage.classList.add('connected-text');
                connectBtn.innerText = "DISCONNECT";
                connectBtn.style.backgroundColor = "transparent";
                connectBtn.style.border = "2px solid #ff3d00";
                connectBtn.style.color = "#ff3d00";
                
                // Unlock the UI
                dashboard.classList.add('active');

                // --- NEW: THE SILENT HANDSHAKE ---
                // Wait 500ms for the BLE connection to settle, then whisper the ID to the bike
                setTimeout(() => {
                    if (userName === "ADRIAN" || userName === "RUBEN") {
                        sendCommand("USER_" + userName);
                    }
                }, 500);

            } catch (error) {
                console.error("BLE Error:", error);
                statusMessage.innerText = "Connection Failed or Canceled";
            }
        });

        function onDisconnected() {
            statusMessage.innerText = "Disconnected";
            statusMessage.classList.remove('connected-text');
            connectBtn.innerText = "PAIR MOTORCYCLE";
            connectBtn.style.backgroundColor = "var(--accent-blue)";
            connectBtn.style.border = "none";
            connectBtn.style.color = "white";
            
            // Lock the UI
            dashboard.classList.remove('active');
            rxCharacteristic = null;
        }

        async function sendCommand(commandText) {
            if (!rxCharacteristic) {
                alert("Motorcycle is not connected!");
                return;
            }

            try {
                let encoder = new TextEncoder();
                let commandData = encoder.encode(commandText);
                
                await rxCharacteristic.writeValue(commandData);
                console.log("Command Sent: ", commandText);
                
                let oldText = statusMessage.innerText;
                statusMessage.innerText = `Command Sent: ${commandText}`;
                setTimeout(() => { if(bleDevice && bleDevice.gatt.connected) statusMessage.innerText = oldText; }, 1000);

            } catch (error) {
                console.error("Write Error:", error);
                statusMessage.innerText = "Error sending command!";
            }
        }

        // NEW SHUTDOWN CONFIRMATION FUNCTION
        function confirmPowerOff() {
            if (confirm("SECURITY ALERT: Are you sure you want to completely shut down the 72V system and arm the alarm?")) {
                sendCommand("POWER_OFF");
            }
        }
    </script>
</body>
</html>
