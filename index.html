<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlindMaster OS Hub</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: #1a1a1a;
            --accent-blue: #00e5ff;
            --accent-green: #00ff88;
            --accent-red: #ff3333;
            --accent-amber: #ffcc00;
            --text-main: #ffffff;
            --text-muted: #555555;
            --border-color: #2a2a2a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header { width: 100%; text-align: center; margin-bottom: 20px; }
        #statusMessage { font-size: 12px; color: var(--text-muted); font-weight: bold; }

        #connectBtn {
            background-color: var(--accent-blue);
            color: black;
            border: none;
            padding: 18px;
            font-size: 14px;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }

        .dashboard {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
            opacity: 0.2;
            pointer-events: none;
        }
        .dashboard.active { opacity: 1; pointer-events: auto; }

        .control-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .control-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

        .control-btn {
            background-color: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 20px 10px;
            font-size: 11px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: bold;
        }
        .control-btn:active { background-color: #333; transform: translateY(2px); }
        .control-btn.active { border-color: var(--accent-blue); color: var(--accent-blue); box-shadow: 0 0 10px rgba(0,229,255,0.2); }

        .btn-icon { font-size: 24px; margin-bottom: 8px; }
        .section-label { color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }

        .btn-horn { background-color: #222; border-color: #333; }
        .btn-horn:active { background-color: var(--accent-amber); color: black; }
    </style>
</head>
<body>

    <header>
        <h2 style="font-size: 18px; letter-spacing: 2px;">BLINDMASTER OS</h2>
        <div id="statusMessage">UPLINK DISCONNECTED</div>
    </header>

    <button id="connectBtn">PAIR WITH MOTORCYCLE</button>

    <div class="dashboard" id="dashboard">
        
        <div class="control-row-3">
            <div class="section-label" style="grid-column: span 3;">Drive Intelligence</div>
            <button class="control-btn" onclick="sendMode('MODE_1', this)"><span>🍃</span> ECO</button>
            <button class="control-btn" onclick="sendMode('MODE_2', this)"><span>🏙️</span> CITY</button>
            <button class="control-btn" onclick="sendMode('MODE_3', this)"><span>⚡</span> SPORT</button>
        </div>

        <div class="control-row">
            <div class="section-label" style="grid-column: span 2;">Lighting Systems</div>
            <button class="control-btn" id="lowBtn" onclick="toggleSimple('LOW', this)"><span>🔆</span> LOW BEAM</button>
            <button class="control-btn" id="highBtn" onclick="toggleSimple('HIGH', this)"><span>⚡</span> HIGH BEAM</button>
        </div>

        <div class="control-row-3">
            <div class="section-label" style="grid-column: span 3;">Signaling</div>
            <button class="control-btn" id="leftBtn" onclick="toggleSimple('LEFT', this)"><span>⬅️</span> LEFT</button>
            <button class="control-btn" id="rightBtn" onclick="toggleSimple('RIGHT', this)"><span>➡️</span> RIGHT</button>
            <button class="control-btn" id="hazBtn" onclick="toggleSimple('HAZ', this)"><span>⚠️</span> HAZARD</button>
        </div>

        <div class="control-row">
            <div class="section-label" style="grid-column: span 2;">Peripherals</div>
            <button class="control-btn btn-horn" style="background: #2a2211;"
                    onmousedown="hornControl(true)" onmouseup="hornControl(false)"
                    ontouchstart="hornControl(true)" ontouchend="hornControl(false)">
                <span>📣</span> HORN (HOLD)
            </button>
            <button class="control-btn" onclick="sendCommand('TRUNK')"><span>🔓</span> TRUNK</button>
        </div>

        <button class="control-btn" style="width: 100%; border-color: var(--accent-red); color: var(--accent-red);" onclick="confirmAction('POWER_OFF', 'SHUTDOWN SYSTEM?')">
            <span>🛑</span> EMERGENCY SHUTDOWN
        </button>

    </div>

    <script>
        const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const RX_CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";

        let bleDevice = null;
        let rxChar = null;
        let states = {};

        const connectBtn = document.getElementById('connectBtn');
        const statusMsg = document.getElementById('statusMessage');
        const dash = document.getElementById('dashboard');

        connectBtn.addEventListener('click', async () => {
            if (bleDevice && bleDevice.gatt.connected) {
                await bleDevice.gatt.disconnect();
                return;
            }
            try {
                statusMsg.innerText = "SEARCHING FOR BIKE...";
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'BlindMaster_B' }],
                    optionalServices: [SERVICE_UUID]
                });
                bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                rxChar = await service.getCharacteristic(RX_CHAR_UUID);
                
                statusMsg.innerText = "UPLINK STABLE";
                connectBtn.innerText = "DISCONNECT";
                dash.classList.add('active');
            } catch (e) {
                statusMsg.innerText = "UPLINK FAILED";
                console.error(e);
            }
        });

        function onDisconnected() {
            statusMsg.innerText = "UPLINK DISCONNECTED";
            connectBtn.innerText = "PAIR WITH MOTORCYCLE";
            dash.classList.remove('active');
        }

        async function sendCommand(cmd) {
            if (!rxChar) return;
            try {
                const encoder = new TextEncoder();
                await rxChar.writeValue(encoder.encode(cmd));
                console.log("Sent: " + cmd);
            } catch (e) { console.error(e); }
        }

        function toggleSimple(prefix, el) {
            states[prefix] = !states[prefix];
            const suffix = states[prefix] ? "_ON" : "_OFF";
            if (states[prefix]) el.classList.add('active');
            else el.classList.remove('active');
            sendCommand(prefix + suffix);
        }

        function hornControl(isOn) {
            sendCommand(isOn ? "HORN_ON" : "HORN_OFF");
        }

        function sendMode(mode, el) {
            document.querySelectorAll('.control-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            sendCommand(mode);
        }

        function confirmAction(cmd, msg) {
            if (confirm(msg)) sendCommand(cmd);
        }
    </script>
</body>
</html>
