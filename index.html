<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlindMaster OS Hub</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #151515;
            --accent-blue: #00d2ff;
            --accent-green: #2dc653;
            --accent-red: #ff3d00;
            --accent-amber: #ffb703;
            --text-main: #ffffff;
            --text-muted: #666666;
            --border-color: #222222;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, -apple-system, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }

        header { width: 100%; text-align: center; margin-bottom: 25px; }
        h1 { font-size: 20px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #fff; }
        
        #statusMessage {
            margin-top: 5px;
            font-size: 13px;
            color: var(--text-muted);
            transition: color 0.3s;
        }

        .connected-text { color: var(--accent-green) !important; }

        #connectBtn {
            background-color: var(--accent-blue);
            color: black;
            border: none;
            padding: 16px;
            font-size: 14px;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            max-width: 350px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 350px;
            opacity: 0.2;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .dashboard-grid.active { opacity: 1; pointer-events: auto; }

        .control-btn {
            background-color: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 15px 5px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .control-btn:active { background-color: #222; transform: scale(0.96); }
        .control-btn.on { border-color: var(--accent-blue); background: rgba(0, 210, 255, 0.05); color: var(--accent-blue); }
        .control-btn.on-green { border-color: var(--accent-green); background: rgba(45, 198, 83, 0.05); color: var(--accent-green); }
        .control-btn.on-red { border-color: var(--accent-red); background: rgba(255, 61, 0, 0.05); color: var(--accent-red); }
        .control-btn.on-amber { border-color: var(--accent-amber); background: rgba(255, 183, 3, 0.05); color: var(--accent-amber); }

        .btn-icon { font-size: 22px; margin-bottom: 6px; }

        .section-title {
            grid-column: span 3;
            text-align: left;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding-left: 5px;
        }

        /* Large Buttons */
        .btn-full { grid-column: span 3; padding: 20px; }
        .btn-half { grid-column: span 1.5; }

        /* Custom Colors for UI Toggles */
        .btn-horn:active { background-color: var(--accent-amber); color: black; }
    </style>
</head>
<body>

    <header>
        <h1>BlindMaster OS</h1>
        <div id="statusMessage">NEURAL LINK OFFLINE</div>
    </header>

    <button id="connectBtn">UPLINK TO CORE</button>

    <div class="dashboard-grid" id="dashboard">
        
        <div class="section-title">Drive Intelligence</div>
        <button class="control-btn" onclick="sendMode('MODE_1', this)">
            <span class="btn-icon">🍃</span> ECO
        </button>
        <button class="control-btn" onclick="sendMode('MODE_2', this)">
            <span class="btn-icon">🏙️</span> CITY
        </button>
        <button class="control-btn" onclick="sendMode('MODE_3', this)">
            <span class="btn-icon">⚡</span> SPORT
        </button>

        <div class="section-title">Visuals & Safety</div>
        <button class="control-btn" onclick="toggleBtn('LOW_TOGGLE', this, 'on')">
            <span class="btn-icon">🔆</span> LOW
        </button>
        <button class="control-btn" onclick="toggleBtn('HIGH_TOGGLE', this, 'on')">
            <span class="btn-icon">⚡</span> HIGH
        </button>
        <button class="control-btn btn-horn" 
                ontouchstart="sendCommand('HORN_ON')" ontouchend="sendCommand('HORN_OFF')"
                onmousedown="sendCommand('HORN_ON')" onmouseup="sendCommand('HORN_OFF')">
            <span class="btn-icon">📣</span> HORN
        </button>

        <div class="section-title">Signaling</div>
        <button class="control-btn" onclick="toggleBtn('LEFT_TOGGLE', this, 'on-green')">
            <span class="btn-icon">⬅️</span> LEFT
        </button>
        <button class="control-btn" onclick="toggleBtn('RIGHT_TOGGLE', this, 'on-green')">
            <span class="btn-icon">➡️</span> RIGHT
        </button>
        <button class="control-btn" onclick="toggleBtn('HAZ_TOGGLE', this, 'on-amber')">
            <span class="btn-icon">⚠️</span> HAZ
        </button>

        <div class="section-title">Special Systems</div>
        <button class="control-btn" style="grid-column: span 2;" onclick="toggleBtn('CRU_TOGGLE', this, 'on')">
            <span class="btn-icon">🚤</span> CRUISE CONTROL
        </button>
        <button class="control-btn btn-red" onclick="sendCommand('TRUNK')">
            <span class="btn-icon">🔓</span> TRUNK
        </button>

        <div class="section-title">Master Power</div>
        <button class="control-btn btn-full" style="color: var(--accent-red); margin-top: 10px;" onclick="confirmPowerOff()">
            <span class="btn-icon">🛑</span> SYSTEM SHUTDOWN
        </button>
    </div>

    <script>
        const SERVICE_UUID = "6E400001-B5A3-F393-E0A9-E50E24DCCA9E".toLowerCase();
        const RX_CHAR_UUID = "6E400002-B5A3-F393-E0A9-E50E24DCCA9E".toLowerCase();

        let userName = localStorage.getItem("blindmaster_user") || "GUEST";
        let bleDevice = null;
        let rxCharacteristic = null;

        const connectBtn = document.getElementById('connectBtn');
        const statusMessage = document.getElementById('statusMessage');
        const dashboard = document.getElementById('dashboard');

        connectBtn.addEventListener('click', async () => {
            if (bleDevice && bleDevice.gatt.connected) {
                bleDevice.gatt.disconnect();
                return;
            }

            try {
                statusMessage.innerText = "Targeting Core...";
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'BlindMaster_B' }],
                    optionalServices: [SERVICE_UUID]
                });

                bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                rxCharacteristic = await service.getCharacteristic(RX_CHAR_UUID);

                statusMessage.innerText = "LINK ESTABLISHED";
                statusMessage.classList.add('connected-text');
                connectBtn.innerText = "TERMINATE UPLINK";
                dashboard.classList.add('active');

                // Identify user
                setTimeout(() => sendCommand("USER_" + userName), 500);

            } catch (error) {
                statusMessage.innerText = "UPLINK FAILED";
            }
        });

        function onDisconnected() {
            statusMessage.innerText = "NEURAL LINK OFFLINE";
            statusMessage.classList.remove('connected-text');
            connectBtn.innerText = "UPLINK TO CORE";
            dashboard.classList.remove('active');
            rxCharacteristic = null;
        }

        async function sendCommand(commandText) {
            if (!rxCharacteristic) return;
            try {
                let encoder = new TextEncoder();
                await rxCharacteristic.writeValue(encoder.encode(commandText));
                console.log("Sent:", commandText);
            } catch (error) {
                console.error("Write Error:", error);
            }
        }

        function toggleBtn(cmd, el, className) {
            el.classList.toggle(className);
            sendCommand(cmd);
        }

        function sendMode(mode, el) {
            // Clear other modes
            document.querySelectorAll('.dashboard-grid .control-btn').forEach(b => {
                if (b.innerText.includes('ECO') || b.innerText.includes('CITY') || b.innerText.includes('SPORT')) {
                    b.classList.remove('on');
                }
            });
            el.classList.add('on');
            sendCommand(mode);
        }

        function confirmPowerOff() {
            if (confirm("SHUTDOWN CONFIRMATION: Are you sure you want to completely kill the 72V system and arm the alarm?")) {
                sendCommand("POWER_OFF");
            }
        }
    </script>
</body>
</html>
