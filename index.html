<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlindMaster OS Hub</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #151515;
            --accent-blue: #00d2ff;
            --accent-green: #2dc653;
            --accent-red: #ff3d00;
            --accent-amber: #ffb703;
            --text-main: #ffffff;
            --text-muted: #666666;
            --border-color: #222222;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header { width: 100%; text-align: center; margin-bottom: 20px; }
        #statusMessage { font-size: 13px; color: var(--text-muted); font-weight: bold; margin-top: 5px; }
        .connected-text { color: var(--accent-green) !important; }

        #connectBtn {
            background-color: var(--accent-blue);
            color: black;
            border: none;
            padding: 16px;
            font-size: 14px;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .dashboard { width: 100%; max-width: 400px; display: none; flex-direction: column; gap: 15px; }
        .dashboard.active { display: flex; }

        .control-group { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 15px; }
        .group-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; font-weight: 800; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

        .action-btn {
            background: #222;
            border: 1px solid #333;
            color: white;
            padding: 15px 5px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.1s;
        }
        .action-btn:active { background: #444; transform: scale(0.95); }
        .btn-on { border-color: rgba(0, 210, 255, 0.5); }
        .btn-off { color: #666; }

        .btn-horn { background: #332211; border-color: #554422; grid-column: span 2; padding: 25px; }
        .btn-horn:active { background: var(--accent-amber); color: black; }
 
        /* USER REGISTRY STYLES */
        .user-selector { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 400px; }
        .user-chip { 
            flex: 1; background: #1a1a1a; border: 1px solid #333; color: #666; 
            padding: 12px; border-radius: 12px; font-size: 11px; font-weight: 800; 
            cursor: pointer; text-align: center; transition: all 0.2s;
        }
        .user-chip.active { background: #222; border-color: var(--accent-blue); color: var(--accent-blue); }
    </style>
</head>
<body>
 
    <header>
        <h1 style="font-size: 20px; letter-spacing: 3px;">BLINDMASTER CORE</h1>
        <div id="statusMessage">LINK OFFLINE</div>
    </header>
 
    <div class="user-selector" id="userSelector">
        <div class="user-chip" id="chip-ADRIAN" onclick="setUser('ADRIAN')">ADRIAN</div>
        <div class="user-chip" id="chip-RUBEN" onclick="setUser('RUBEN')">RUBEN</div>
    </div>
 
    <button id="connectBtn">ESTABLISH UPLINK</button>
 
    <div class="dashboard" id="dashboard">
        
        <!-- DRIVE MODES -->
        <div class="control-group">
            <div class="group-label">Drive Intelligence</div>
            <div class="btn-grid-3">
                <button class="action-btn" onclick="sendCommand('MODE_1')">ECO</button>
                <button class="action-btn" onclick="sendCommand('MODE_2')">CITY</button>
                <button class="action-btn" onclick="sendCommand('MODE_3')">SPORT</button>
            </div>
        </div>

        <!-- LIGHTS -->
        <div class="control-group">
            <div class="group-label">Low Beam (Pin 5)</div>
            <div class="btn-grid">
                <button class="action-btn btn-on" onclick="sendCommand('LOW_ON')">Lights ON</button>
                <button class="action-btn btn-off" onclick="sendCommand('LOW_OFF')">Lights OFF</button>
            </div>
        </div>

        <div class="control-group">
            <div class="group-label">High Beam (Pin 17)</div>
            <div class="btn-grid">
                <button class="action-btn btn-on" onclick="sendCommand('HIGH_ON')">Beam ON</button>
                <button class="action-btn btn-off" onclick="sendCommand('HIGH_OFF')">Beam OFF</button>
            </div>
        </div>

        <!-- SIGNALS -->
        <div class="control-group">
            <div class="group-label">Signaling (Pins 7, 1, 15)</div>
            <div class="btn-grid-3">
                <button class="action-btn" onclick="sendCommand('LEFT_ON')">L ON</button>
                <button class="action-btn" onclick="sendCommand('HAZ_ON')">⚠️ HAZ</button>
                <button class="action-btn" onclick="sendCommand('RIGHT_ON')">R ON</button>
            </div>
            <div class="btn-grid-3" style="margin-top: 8px;">
                <button class="action-btn btn-off" onclick="sendCommand('LEFT_OFF')">L OFF</button>
                <button class="action-btn btn-off" onclick="sendCommand('HAZ_OFF')">⚠️ OFF</button>
                <button class="action-btn btn-off" onclick="sendCommand('RIGHT_OFF')">R OFF</button>
            </div>
        </div>

        <!-- PERIPHERALS -->
        <div class="control-group">
            <div class="group-label">Hardware Overrides</div>
            <div class="btn-grid">
                <button class="action-btn btn-horn" 
                        onmousedown="sendCommand('HORN_ON')" onmouseup="sendCommand('HORN_OFF')"
                        ontouchstart="sendCommand('HORN_ON')" ontouchend="sendCommand('HORN_OFF')">
                    📣 HORN (HOLD)
                </button>
                <button class="action-btn" onclick="sendCommand('TRUNK')">🔓 TRUNK</button>
                <button class="action-btn" onclick="sendCommand('CRU_ON')">🚀 CRUISE ON</button>
                <button class="action-btn" onclick="sendCommand('CRU_OFF')">CRUISE OFF</button>
            </div>
        </div>

        <button class="action-btn" style="border-color: var(--accent-red); color: var(--accent-red); margin-top: 10px;" onclick="confirmAction()">
            🛑 SYSTEM SHUTDOWN
        </button>

    </div>

    <script>
        const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const RX_CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";

        let bleDevice = null;
        let rxChar = null;

        const connectBtn = document.getElementById('connectBtn');
        const statusMsg = document.getElementById('statusMessage');
        const dash = document.getElementById('dashboard');

        connectBtn.addEventListener('click', async () => {
            if (bleDevice && bleDevice.gatt.connected) {
                await bleDevice.gatt.disconnect();
                return;
            }
            try {
                statusMsg.innerText = "LINKING TO BRAIN...";
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'BlindMaster_B' }],
                    optionalServices: [SERVICE_UUID]
                });
                bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                rxChar = await service.getCharacteristic(RX_CHAR_UUID);

                statusMsg.innerText = "LINK ESTABLISHED";
                statusMsg.classList.add('connected-text');
                connectBtn.innerText = "TERMINATE UPLINK";
                dash.classList.add('active');

                // SYNC TIME TO MOTORCYCLE
                const now = new Date();
                const h = now.getHours().toString().padStart(2, '0');
                const m = now.getMinutes().toString().padStart(2, '0');
                const s = now.getSeconds().toString().padStart(2, '0');
                sendCommand("TIME:" + h + m + s);
 
                // AUTO-SEND USER GREETING
                setTimeout(() => {
                    const currentUser = localStorage.getItem('bm_user') || 'ADRIAN';
                    sendCommand("USER_" + currentUser);
                }, 500); // Small delay to let time sync settle
            } catch (e) {
                statusMsg.innerText = "LINK FAILED";
                console.error(e);
            }
        });
 
        // --- USER IDENTITY LOGIC ---
        function setUser(user) {
            localStorage.setItem('bm_user', user);
            updateUserUI();
        }
 
        function updateUserUI() {
            const current = localStorage.getItem('bm_user') || 'ADRIAN';
            document.querySelectorAll('.user-chip').forEach(c => c.classList.remove('active'));
            const chip = document.getElementById('chip-' + current);
            if (chip) chip.classList.add('active');
        }
 
        // Initial Load
        updateUserUI();
 
        function onDisconnected() {
            statusMsg.innerText = "LINK OFFLINE";
            statusMsg.classList.remove('connected-text');
            connectBtn.innerText = "ESTABLISH UPLINK";
            dash.classList.remove('active');
            rxChar = null;
        }

        async function sendCommand(cmd) {
            if (!rxChar) return;
            try {
                const encoder = new TextEncoder();
                await rxChar.writeValue(encoder.encode(cmd));
                console.log("Sent: " + cmd);
            } catch (e) {
                console.error("BLE Error:", e);
                statusMsg.innerText = "COMMS ERROR";
            }
        }

        function confirmAction() {
            if (confirm("DANGER: Shut down 72V system?")) {
                sendCommand('POWER_OFF');
            }
        }
    </script>
</body>
</html>
